services:
  postgres:
    image: postgres:16-alpine
    container_name: padel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: padel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - padel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d padel"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  padel_pg_data:
